name: build upload and deploy

on:
  workflow_run:
    workflows: ["Security Check"]
    types:
      - completed
    branches:
      [main]

env:
  IMAGE_NAME: se-project-fe-68-2-deemaknisit
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run build and check
        run: npm ci && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
            scan-type: image
            image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
            severity: CRITICAL
            exit-code: '1'
            ignore-unfixed: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          FULL=${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME
          docker tag $IMAGE_NAME:${{ github.sha }} $FULL:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} $FULL:latest
          docker push $FULL:${{ github.sha }}
          docker push $FULL:latest

  deploy:
    name: Mirror to Vercel Repo
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create history-free snapshot commit
        id: snapshot
        run: |
          SNAPSHOT_COMMIT=$(git commit-tree HEAD^{tree} -m "Vercel snapshot ${GITHUB_SHA}")
          echo "snapshot_commit=${SNAPSHOT_COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Push snapshot to Vercel repo
        env:
          VERCEL_REPO_SLUG: Pitichod/se-project-fe-68-2-deemaknisit
          VERCEL_REPO_TOKEN: ${{ secrets.VERCEL_REPO_TOKEN }}
        run: |
          if [ -z "$VERCEL_REPO_TOKEN" ]; then
            echo "Missing VERCEL_REPO_TOKEN secret"
            exit 1
          fi

          AUTHED_URL="https://x-access-token:${VERCEL_REPO_TOKEN}@github.com/${VERCEL_REPO_SLUG}.git"

          if ! git ls-remote "$AUTHED_URL" HEAD >/dev/null 2>&1; then
            echo "Cannot access the Vercel repo with the provided token."
            echo "Check that VERCEL_REPO_SLUG is correct and that VERCEL_REPO_TOKEN has write access to that repo."
            exit 1
          fi

          git push --force "$AUTHED_URL" "${{ steps.snapshot.outputs.snapshot_commit }}:main"
name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed
    branches: [ main ]

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write
  security-events: write
  actions: read

env:
  IMAGE_NAME: se-project-fe-68-2-deemaknisit
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # GATE#0: Secret scanning
  secret-scanning:
    name: Secret Scanning (TruffleHog + Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  # GATE#1: SAST (SonarQube & CodeQL)
  sast-scan:
    name: SAST (SonarQube)
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  codeql-scan:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }}
    strategy:
      matrix:
        language: [ 'javascript-typescript' ]
    steps:
      - uses: actions/checkout@v5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # GATE#2: Dependency scanning
  dependency-scanning:
    name: Dependency Scan (Depcheck)
    runs-on: ubuntu-latest
    needs: [sast-scan, codeql-scan]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci
        
      - name: Depcheck
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        id: Depcheck
        with:
          project: 'RentalCarFrontend'
          path: '.'
          format: 'sarif'
          out: 'reports'
          args: >
            --failOnCVSS 7.0
            --enableRetired
            
      - name: Upload Depcheck SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

      - name: Upload Depcheck HTML report as artifact
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-report
          path: reports/